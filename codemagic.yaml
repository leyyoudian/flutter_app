workflows:
  ios_app_store:
    name: iOS App Store IPA
    instance_type: mac_mini_m2
    max_build_duration: 120
    working_directory: app_gif
    integrations:
      app_store_connect: codemagic
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.leyyoudian.espbaji
    scripts:
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Install pods
        script: |
          find . -name "Podfile" -execdir pod install \;
      - name: Set up App Store code signing
        script: |
          xcode-project use-profiles
      - name: Build app-store-ipa
        script: |
          flutter build ipa --release --export-options-plist=$HOME/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - flutter_drive.log

  ios-release:
    name: iOS Release IPA
    instance_type: mac_mini_m2
    max_build_duration: 120
    working_directory: app_gif
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Install pods
        script: |
          find . -name "Podfile" -execdir pod install \;
      - name: Build ad-hoc iOS release IPA for sideloading
        script: |
          flutter build ios --release --no-codesign
          APP_PATH="build/ios/iphoneos/Runner.app"
          test -d "$APP_PATH"
          if [ -e "$APP_PATH/Runner.debug.dylib" ] || [ -e "$APP_PATH/__preview.dylib" ]; then
            echo "Debug dylib found in release app; refusing to package invalid sideload IPA"
            find "$APP_PATH" -maxdepth 1 -name "*.dylib" -print
            exit 1
          fi
          /usr/bin/codesign --force --deep --sign - "$APP_PATH"
          /usr/bin/otool -l "$APP_PATH/Runner" | grep -q LC_CODE_SIGNATURE
          rm -rf build/ios/ipa/Payload
          mkdir -p build/ios/ipa/Payload
          cp -R "$APP_PATH" build/ios/ipa/Payload/Runner.app
          cd build/ios/ipa
          /usr/bin/zip -qry Runner-release-adhoc.ipa Payload
          /usr/bin/zipinfo -1 Runner-release-adhoc.ipa | grep -q '^Payload/Runner.app/Runner$'
          ! /usr/bin/zipinfo -1 Runner-release-adhoc.ipa | grep -q 'Runner.debug.dylib'
    artifacts:
      - build/ios/ipa/Runner-release-adhoc.ipa
      - flutter_drive.log
    publishing:
      email:
        recipients:
          - leyyoudian@example.com
        notify:
          success: true
          failure: true
