workflows:
  ios-release:
    name: iOS Release IPA
    instance_type: mac_mini_m2
    max_build_duration: 120
    working_directory: app_gif
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Install pods
        script: |
          find . -name "Podfile" -execdir pod install \;
      - name: Build iOS release IPA
        script: |
          flutter build ipa --release --no-codesign
    artifacts:
      - build/ios/ipa/*.ipa
      - flutter_drive.log
    publishing:
      email:
        recipients:
          - leyyoudian@example.com
        notify:
          success: true
          failure: true
